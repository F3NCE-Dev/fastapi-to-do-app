version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@pg:5432/app
      - STATIC_DIR=static
      - REDIRECT_URI=http://localhost:5500
    volumes:
      - ./backend/static:/app/static

  frontend:
    build: ./frontend
    ports:
      - "5500:80"

  pg:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
